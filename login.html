<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영진전문대학교 - 통합로그인</title>
  <meta name="description" content="영진전문대학교 공식 통합 로그인 페이지입니다. 안전한 보안 환경에서 통합 회원 서비스에 로그인하세요.">
  
  <!-- SEO & Open Graph -->
  <meta property="og:title" content="영진전문대학교 - 통합로그인">
  <meta property="og:description" content="영진전문대학교 공식 통합 로그인 페이지입니다. 안전한 보안 환경에서 통합 회원 서비스에 로그인하세요.">
  <meta property="og:type" content="website">
  
  <!-- Web Fonts (Noto Sans KR, Montserrat) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons for UI Enhancements -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- External CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Decorative Spheres for Modern Glassmorphism Accent -->
  <div class="bg-bubble bg-bubble-1"></div>
  <div class="bg-bubble bg-bubble-2"></div>

  <div class="app-container">
    <!-- Header Area -->
    <header class="app-header">
      <div class="logo-area">
        <div class="yju-logo-container">
          <img src="yju_logo.png" class="yju-logo-img" alt="영진전문대학교 로고">
          <div class="logo-text-group">
            <span class="logo-text-en">YJU</span>
            <span class="logo-text-ko">영진전문대학교</span>
          </div>
        </div>
      </div>
      <p class="header-subtitle">INTEGRATED PORTAL LOGIN</p>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
      <section class="signup-card">
        <div class="card-header">
          <h1 class="card-title">통합 로그인</h1>
          <p class="card-desc">영진전문대학교의 다양한 대학 서비스를 이용하기 위해 아이디와 비밀번호를 입력해 주세요.</p>
        </div>

        <form id="loginForm" class="signup-form" novalidate>
          
          <!-- 1. 아이디 입력 필드 -->
          <div class="form-group" id="group-username">
            <label for="username" class="form-label">아이디</label>
            <div class="input-wrapper">
              <i class="input-icon fa-regular fa-user"></i>
              <input type="text" id="username" name="username" class="form-input" placeholder="아이디 입력" required autocomplete="username">
            </div>
            <div class="validation-message" id="msg-username">아이디를 입력해 주세요.</div>
          </div>

          <!-- 2. 비밀번호 입력 필드 -->
          <div class="form-group" id="group-password">
            <label for="password" class="form-label">비밀번호</label>
            <div class="input-wrapper">
              <i class="input-icon fa-solid fa-lock"></i>
              <input type="password" id="password" name="password" class="form-input" placeholder="비밀번호 입력" required autocomplete="current-password">
            </div>
            <div class="validation-message" id="msg-password">비밀번호를 입력해 주세요.</div>
          </div>

          <!-- 로그인 오류 메시지 영역 -->
          <div class="validation-message" id="msg-login-error" style="text-align: center; margin-top: 4px; padding: 10px; background-color: var(--error-bg); border: 1px solid var(--error-border); border-radius: var(--radius-sm);">
            아이디 또는 비밀번호가 올바르지 않습니다.
          </div>

          <!-- 로그인 버튼 -->
          <button type="submit" id="btnLoginSubmit" class="btn-submit" style="margin-top: 1rem;">
            <span>로그인</span>
            <i class="fa-solid fa-right-to-bracket"></i>
          </button>

          <!-- 회원가입 이동 링크 -->
          <div style="text-align: center; margin-top: 1rem;">
            <a href="index.html" class="terms-link" style="font-size: 0.85rem;">아직 계정이 없으신가요? 회원가입 바로가기</a>
          </div>

        </form>
      </section>
    </main>

    <!-- Footer Area -->
    <footer class="app-footer">
      <p class="copyright">&copy; 2026 YEUNGJIN UNIVERSITY. ALL RIGHTS RESERVED.</p>
      <div class="footer-links">
        <a href="https://www.yju.ac.kr" target="_blank" rel="noopener noreferrer">대학 공식홈페이지</a>
        <span class="divider">|</span>
        <a href="#">개인정보처리방침</a>
      </div>
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const groupUsername = document.getElementById('group-username');
      const groupPassword = document.getElementById('group-password');
      const msgUsername = document.getElementById('msg-username');
      const msgPassword = document.getElementById('msg-password');
      const msgLoginError = document.getElementById('msg-login-error');
      const btnSubmit = document.getElementById('btnLoginSubmit');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset states
        let isValid = true;
        groupUsername.classList.remove('error');
        groupPassword.classList.remove('error');
        msgUsername.style.display = 'none';
        msgUsername.style.opacity = '0';
        msgPassword.style.display = 'none';
        msgPassword.style.opacity = '0';
        msgLoginError.style.display = 'none';
        msgLoginError.style.opacity = '0';

        const usernameVal = usernameInput.value.trim();
        const passwordVal = passwordInput.value;

        // Validation checks
        if (!usernameVal) {
          groupUsername.classList.add('error');
          msgUsername.style.display = 'block';
          msgUsername.style.opacity = '1';
          isValid = false;
        }

        if (!passwordVal) {
          groupPassword.classList.add('error');
          msgPassword.style.display = 'block';
          msgPassword.style.opacity = '1';
          isValid = false;
        }

        if (!isValid) return;

        // Start animation
        btnSubmit.disabled = true;
        const originalText = btnSubmit.innerHTML;
        btnSubmit.innerHTML = `<span>로그인 중...</span> <i class="fa-solid fa-spinner fa-spin"></i>`;

        try {
          // Network delay simulation (600ms)
          await new Promise(resolve => setTimeout(resolve, 600));

          // Fetch registered users from localStorage
          const users = JSON.parse(localStorage.getItem('yju_users') || '[]');
          
          // Match user credentials
          const matchedUser = users.find(u => u.username === usernameVal && u.password === passwordVal);

          if (matchedUser) {
            // Set session storage
            const now = new Date();
            const formattedDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ` +
                                  `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            
            const sessionUser = {
              username: matchedUser.username,
              email: matchedUser.email,
              phone: matchedUser.phone,
              loginTime: formattedDate
            };
            
            sessionStorage.setItem('yju_logged_in_user', JSON.stringify(sessionUser));
            
            // Redirect to dashboard portal
            window.location.href = 'main.html';
          } else {
            // Display auth error
            msgLoginError.style.display = 'block';
            setTimeout(() => {
              msgLoginError.style.opacity = '1';
            }, 50);
            groupUsername.classList.add('error');
            groupPassword.classList.add('error');
          }
        } catch (err) {
          console.error(err);
          alert('로그인 처리 중 오류가 발생했습니다.');
        } finally {
          btnSubmit.disabled = false;
          btnSubmit.innerHTML = originalText;
        }
      });
    });
  </script>
</body>
</html>
